        // Helper date formatters
        function formatDateISO(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function formatTimeISO(date) {
            const h = String(date.getHours()).padStart(2, '0');
            const m = String(date.getMinutes()).padStart(2, '0');
            return `${h}:${m}`;
        }

        function initSwipeNavigation() {
            const grid = document.getElementById('cal-grid');
            if (!grid) return;

            let startX = 0;
            let startY = 0;
            let isMouseDown = false;

            // Touch events for mobile/tablet
            grid.addEventListener('touchstart', (e) => {
                startX = e.touches[0].screenX;
                startY = e.touches[0].screenY;
            }, { passive: true });

            grid.addEventListener('touchend', (e) => {
                const diffX = e.changedTouches[0].screenX - startX;
                const diffY = e.changedTouches[0].screenY - startY;
                handleSwipe(diffX, diffY);
            }, { passive: true });

            // Mouse events for PC drag navigation
            grid.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return; // Only left click
                startX = e.screenX;
                startY = e.screenY;
                isMouseDown = true;
            });

            grid.addEventListener('mouseup', (e) => {
                if (!isMouseDown) return;
                isMouseDown = false;
                const diffX = e.screenX - startX;
                const diffY = e.screenY - startY;
                handleSwipe(diffX, diffY);
            });

            grid.addEventListener('mouseleave', () => {
                isMouseDown = false;
            });

            function handleSwipe(diffX, diffY) {
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 60) {
                    if (diffX > 0) {
                        navigateMonth(-1); // Swipe right -> Previous Month
                    } else {
                        navigateMonth(1);  // Swipe left -> Next Month
                    }
                }
            }
        }

        // ── Routine System Logic ──────────────────────────────────────────
        let routineCalendarId = null;

        const ROUTINE_USERS = ['엄마', '윤호', '윤서'];
        let routineTaskLists = {}; // { '엄마': 'listId', ... }

        async function initRoutineSystem() {
            try {
                await ensureRoutineCalendar();
                await ensureRoutineTaskLists();
                await checkAndResetDailyRoutines();
                await renderRoutineHistory();
                renderRoutineTasks();
            } catch (err) {
                console.error("Routine Init Error:", err);
            }

        async function ensureRoutineCalendar() {
            let res = await gapi.client.calendar.calendarList.list();
            let cals = res.result.items;
            let histCal = cals.find(c => c.summary === ROUTINE_CALENDAR_NAME);
            if (!histCal) {
                res = await gapi.client.calendar.calendars.insert({
                    resource: { summary: ROUTINE_CALENDAR_NAME }
                });
                histCal = res.result;
            }
            routineCalendarId = histCal.id;
        }

        async function ensureRoutineTaskLists() {
            let res = await gapi.client.tasks.tasklists.list();
            let lists = res.result.items || [];
            
            for (let user of ROUTINE_USERS) {
                let userList = lists.find(l => l.title === user);
                if (!userList) {
                    res = await gapi.client.tasks.tasklists.insert({
                        resource: { title: user }
                    });
                    userList = res.result;
                }
                routineTaskLists[user] = userList.id;
            }
        }

        async function checkAndResetDailyRoutines() {
            const todayStr = formatDateISO(TODAY); // "YYYY-MM-DD"
            
            let res = await gapi.client.calendar.events.list({
                calendarId: routineCalendarId,
                timeMin: todayStr + 'T00:00:00Z',
                timeMax: todayStr + 'T23:59:59Z',
                singleEvents: true
            });
            
            let todayEvent = res.result.items.find(e => e.summary === 'ROUTINE_DATA');
            let needReset = !todayEvent;
            
            for (let user of ROUTINE_USERS) {
                let listId = routineTaskLists[user];
                let tasksRes = await gapi.client.tasks.tasks.list({ tasklist: listId, showHidden: true, maxResults: 100 });
                let tasks = tasksRes.result.items || [];
                tasks.sort((a, b) => (a.position || '').localeCompare(b.position || ''));
                routineTasks[user] = tasks;

                if (needReset) {
                    for (let task of routineTasks[user]) {
                        if (task.status === 'completed') {
                            task.status = 'needsAction';
                            task.completed = null;
                            await gapi.client.tasks.tasks.update({
                                tasklist: listId,
                                task: task.id,
                                resource: task
                            });
                        }
                    }
                }
            }
            
            if (needReset) {
                await upsertRoutineEvent();
            }
        }

        async function upsertRoutineEvent() {
            const todayStr = formatDateISO(TODAY);
            
            let data = {};
            for (let user of ROUTINE_USERS) {
                let tasks = routineTasks[user] || [];
                if (tasks.length === 0) {
                    data[user] = 0;
                } else {
                    let completed = tasks.filter(t => t.status === 'completed').length;
                    data[user] = Math.round((completed / tasks.length) * 100);
                }
            }
            
            let description = JSON.stringify(data);
            
            let res = await gapi.client.calendar.events.list({
                calendarId: routineCalendarId,
                timeMin: todayStr + 'T00:00:00Z',
                timeMax: todayStr + 'T23:59:59Z',
                singleEvents: true
            });
            let todayEvent = res.result.items.find(e => e.summary === 'ROUTINE_DATA');
            
            if (todayEvent) {
                todayEvent.description = description;
                await gapi.client.calendar.events.update({
                    calendarId: routineCalendarId,
                    eventId: todayEvent.id,
                    resource: todayEvent
                });
            } else {
                await gapi.client.calendar.events.insert({
                    calendarId: routineCalendarId,
                    resource: {
                        summary: 'ROUTINE_DATA',
                        description: description,
                        start: { date: todayStr },
                        end: { date: todayStr }
                    }
                });
            }
            
            renderRoutineTasks();
            await renderRoutineHistory();
        }

        async function toggleRoutineTask(user, taskId, isChecked) {
            let task = routineTasks[user].find(t => t.id === taskId);
            if (!task) return;
            
            task.status = isChecked ? 'completed' : 'needsAction';
            if (!isChecked) task.completed = null;
            
            // Optimistic UI update
            renderRoutineTasks();
            
            try {
                await gapi.client.tasks.tasks.update({
                    tasklist: routineTaskLists[user],
                    task: task.id,
                    resource: task
                });
                await upsertRoutineEvent();
            } catch (err) {
                console.error("Task toggle error:", err);
                if (err.status === 403) {
                    alert('보안 권한(Scope)이 부족합니다. 좌측 메뉴 상단의 로그아웃을 누른 뒤 다시 로그인하여 권한을 허용해주세요.');
                } else {
                    alert('작업 상태 업데이트에 실패했습니다.');
                }
                task.status = !isChecked ? 'completed' : 'needsAction';
                renderRoutineTasks();
            }
        }

        function renderRoutineTasks() {
            for (let user of ROUTINE_USERS) {
                let userKey = user === '엄마' ? 'mom' : (user === '윤호' ? 'yunho' : 'yunseo');
                let listEl = document.getElementById('list-' + userKey);
                let progEl = document.getElementById('prog-' + userKey);
                
                let tasks = routineTasks[user] || [];
                if (tasks.length === 0) {
                    listEl.innerHTML = '<div style="padding:12px; font-size:13px; color:#5f6368;">루틴 작업이 없습니다. 구글 Tasks에서 추가해주세요.</div>';
                    progEl.innerText = '0%';
                    continue;
                }
                
                let completedCount = tasks.filter(t => t.status === 'completed').length;
                let pct = Math.round((completedCount / tasks.length) * 100);
                progEl.innerText = pct + '%';
                
                let html = '';
                for (let task of tasks) {
                    let isChecked = task.status === 'completed';
                    html += `
                        <div class="routine-task-item ${isChecked ? 'completed' : ''}">
                            <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleRoutineTask('${user}', '${task.id}', this.checked)">
                            <div class="routine-task-title">${task.title}</div>
                        </div>
                    `;
                }
                listEl.innerHTML = html;
            }
        }

        async function renderRoutineHistory() {
            const grid = document.getElementById('routine-history-grid');
            if(!grid) return;
            
            let y = TODAY.getFullYear();
            let m = TODAY.getMonth();
            let firstDay = new Date(y, m, 1);
            let lastDay = new Date(y, m + 1, 0);
            
            let res = await gapi.client.calendar.events.list({
                calendarId: routineCalendarId,
                timeMin: firstDay.toISOString(),
                timeMax: new Date(y, m + 1, 1).toISOString(),
                singleEvents: true
            });
            
            let events = res.result.items || [];
            let routineDataByDate = {}; 
            
            events.forEach(e => {
                if(e.summary === 'ROUTINE_DATA' && e.start.date) {
                    try {
                        routineDataByDate[e.start.date] = JSON.parse(e.description);
                    } catch(err){}
                }
            });
            
            let html = '';
            for(let d=1; d<=lastDay.getDate(); d++) {
                let dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let data = routineDataByDate[dStr] || { '엄마': 0, '윤호': 0, '윤서': 0 };
                
                html += `<div class="routine-hist-day">
                    <div class="routine-hist-date">${d}일</div>
                    <div class="routine-hist-bars">
                        <div class="hist-bar-row">
                            <span class="hist-bar-label">엄.</span>
                            <div class="hist-bar-track"><div class="hist-bar-fill mom" style="width:${data['엄마'] || 0}%"></div></div>
                        </div>
                        <div class="hist-bar-row">
                            <span class="hist-bar-label">호.</span>
                            <div class="hist-bar-track"><div class="hist-bar-fill yunho" style="width:${data['윤호'] || 0}%"></div></div>
                        </div>
                        <div class="hist-bar-row">
                            <span class="hist-bar-label">서.</span>
                            <div class="hist-bar-track"><div class="hist-bar-fill yunseo" style="width:${data['윤서'] || 0}%"></div></div>
                        </div>
                    </div>
                </div>`;
            }
            grid.innerHTML = html;
        }

        // ── Weather Widget Logic ──────────────────────────────────────────
        function toggleHourlyWeather() {
            const container = document.getElementById('weather-hourly-container');
            const icon = document.getElementById('weather-toggle-icon');
            if (container.style.display === 'none') {
                container.style.display = 'block';
                if(icon) icon.innerText = '▴';
            } else {
                container.style.display = 'none';
                if(icon) icon.innerText = '▾';
            }
        }

        function getWeatherEmoji(code) {
            // WMO Weather interpretation codes (https://open-meteo.com/en/docs)
            if (code === 0) return '☀️'; // Clear sky
            if (code === 1 || code === 2 || code === 3) return '🌤️'; // Mainly clear, partly cloudy, and overcast
            if (code === 45 || code === 48) return '🌫️'; // Fog
            if (code === 51 || code === 53 || code === 55) return '🌦️'; // Drizzle
            if (code === 56 || code === 57) return '🌧️'; // Freezing Drizzle
            if (code === 61 || code === 63 || code === 65) return '🌧️'; // Rain
            if (code === 66 || code === 67) return '🌧️'; // Freezing Rain
            if (code === 71 || code === 73 || code === 75) return '❄️'; // Snow fall
            if (code === 77) return '❄️'; // Snow grains
            if (code === 80 || code === 81 || code === 82) return '☔'; // Rain showers
            if (code === 85 || code === 86) return '🌨️'; // Snow showers
            if (code === 95) return '⛈️'; // Thunderstorm
            if (code === 96 || code === 99) return '⛈️'; // Thunderstorm with slight and heavy hail
            return '☁️';
        }

        async function initWeatherWidget() {
            try {
                // Gwangmyeong-si coordinates: 37.4785, 126.8646
                const url = 'https://api.open-meteo.com/v1/forecast?latitude=37.4785&longitude=126.8646&daily=weather_code,temperature_2m_max,temperature_2m_min&hourly=temperature_2m,precipitation_probability,precipitation,weather_code&timezone=Asia%2FTokyo&forecast_days=2';
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();

                // 1. Update Daily Summary
                const todayMax = Math.round(data.daily.temperature_2m_max[0]);
                const todayMin = Math.round(data.daily.temperature_2m_min[0]);
                const todayCode = data.daily.weather_code[0];
                const todayEmoji = getWeatherEmoji(todayCode);

                document.getElementById('weather-summary-text').innerText = `오늘 광명: ${todayEmoji} 최저 ${todayMin}°C / 최고 ${todayMax}°C`;

                // 2. Populate Hourly Table
                const hourlyTable = document.getElementById('weather-hourly-table');
                hourlyTable.innerHTML = '';

                const now = new Date();
                // Find index of current hour
                const localTimeString = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().slice(0, 13) + ':00';
                
                let startIndex = data.hourly.time.findIndex(t => t === localTimeString);
                if (startIndex === -1) startIndex = 0; // fallback

                // Get 24 hours of data starting from current hour
                for (let i = startIndex; i < startIndex + 24; i++) {
                    if (i >= data.hourly.time.length) break;

                    const timeStr = data.hourly.time[i]; // "2026-06-25T12:00"
                    const dateObj = new Date(timeStr);
                    const hour = dateObj.getHours();
                    const timeLabel = (i === startIndex) ? '지금' : `${hour}시`;

                    const temp = Math.round(data.hourly.temperature_2m[i]);
                    const precipProb = data.hourly.precipitation_probability[i];
                    const precipAmt = data.hourly.precipitation[i];
                    const code = data.hourly.weather_code[i];

                    const col = document.createElement('div');
                    col.className = 'weather-hour-col';
                    
                    const timeEl = document.createElement('div');
                    timeEl.className = 'w-time';
                    timeEl.innerText = timeLabel;

                    const iconEl = document.createElement('div');
                    iconEl.className = 'w-icon';
                    iconEl.innerText = getWeatherEmoji(code);

                    const tempEl = document.createElement('div');
                    tempEl.className = 'w-temp';
                    tempEl.innerText = `${temp}°`;

                    const popEl = document.createElement('div');
                    popEl.className = 'w-pop';
                    popEl.innerText = precipProb > 0 ? `${precipProb}%` : '';

                    const precipEl = document.createElement('div');
                    precipEl.className = 'w-precip';
                    precipEl.innerText = precipAmt > 0 ? `${precipAmt}mm` : '';

                    col.appendChild(timeEl);
                    col.appendChild(iconEl);
                    col.appendChild(tempEl);
                    col.appendChild(popEl);
                    col.appendChild(precipEl);

                    hourlyTable.appendChild(col);
                }

            } catch (err) {
                console.error('Failed to fetch weather data:', err);
                document.getElementById('weather-summary-text').innerText = '날씨 오류';
            }
        }

        // ── Init ───────────────────────────────────────────────────────────
        window.onload = () => {
            if (!CONFIG.CLIENT_ID || CONFIG.CLIENT_ID.startsWith('YOUR_CLIENT_ID')) {
                document.getElementById('config-warn').style.display = 'block';
            }
            renderMiniCalendar();
            renderMainCalendar();
            renderEventList();
            initSwipeNavigation();
            initWeatherWidget();
        };
    </script>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
